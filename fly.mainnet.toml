app = 'moonlight-mainnet-pay'
primary_region = 'ams'

[build]

[env]
  PORT = '8080'
  MODE = 'production'
  LOG_LEVEL = 'INFO'

  # STELLAR
  STELLAR_RPC_URL = 'https://soroban-testnet.stellar.org'

  # OPENTELEMETRY
  OTEL_DENO = 'true'
  OTEL_SERVICE_NAME = 'pay-platform-mainnet'
  OTEL_EXPORTER_OTLP_PROTOCOL = 'http/protobuf'
  # OTEL_EXPORTER_OTLP_ENDPOINT and OTEL_EXPORTER_OTLP_HEADERS set in fly.io secrets

  # SERVICE
  # SERVICE_DOMAIN — set via Fly secrets per environment
  # SERVICE_AUTH_SECRET=set in fly.io env secrets

  # AUTH
  CHALLENGE_TTL = '900'
  SESSION_TTL = '21600'

[processes]
  app = 'deno task serve'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = "5s"
    timeout = "3s"
    grace_period = "60s"
    method = "GET"
    path = "/api/v1/health"

[deploy]
  strategy = "bluegreen"
  release_command = "deno run -A --node-modules-dir npm:drizzle-kit migrate"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
